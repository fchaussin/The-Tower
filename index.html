<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="description" content="A minimalist tower defense game">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<title>The Tower</title>
<style>
  /* Inline CSS for immediate splash screen rendering */
  #splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    color: #fff;
    font-family: monospace;
    transition: opacity 0.5s ease;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top-color: #0df;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div id="splash-screen">
  <div class="spinner"></div>
  <h2>LOADING...</h2>
</div>
<div id="ui-layer">
  <div id="main-menu" class="menu-container">
    <h1>THE TOWER</h1>
    
    <div id="auth-section" class="hidden" style="margin-bottom: 20px; text-align: center;">
      <button id="loginBtn" class="btn" style="background: #4285F4; border-color: #4285F4; margin-bottom: 10px; font-size: 14px;">LOGIN WITH GOOGLE</button>
      <div id="userInfo" class="hidden" style="font-size: 12px; color: #0df;"></div>
    </div>

    <div class="input-group">
      <label for="playerName">Player Name:</label>
      <input type="text" id="playerName" placeholder="Enter your name" maxlength="15" />
    </div>
    <button id="startBtn" class="btn">START GAME</button>
    
    <div class="leaderboard">
      <h2>Top Scores</h2>
      <ul id="scoreList"></ul>
    </div>
  </div>
  
  <div id="game-over-menu" class="menu-container hidden">
    <h1>GAME OVER</h1>
    <p id="finalScore">Score: 0</p>
    <p id="finalLevel">Level: 1</p>
    <button id="restartBtn" class="btn">PLAY AGAIN</button>
  </div>
</div>
<canvas id="gameCanvas"></canvas>
<script type="module" src="/src/main.js"></script>
</body>
</html>
